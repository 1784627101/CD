<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高精度OCR识别器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 40px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        #fileInput {
            display: none;
        }
        .upload-icon {
            font-size: 3em;
            color: #ccc;
            margin-bottom: 10px;
        }
        .upload-text {
            color: #666;
            font-size: 1.1em;
        }
        .image-preview {
            margin: 20px 0;
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: none;
        }
        #imageCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
        .result {
            margin-top: 20px;
            text-align: left;
        }
        #resultText {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            background: #f9f9f9;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            display: none;
            color: #667eea;
            font-size: 18px;
            margin: 20px 0;
        }
        .progress {
            width: 100%;
            height: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        .accuracy-note {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            color: #2e7d32;
        }
        .api-config {
            margin-bottom: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: left;
        }
        .api-config h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .api-input {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .api-input label {
            min-width: 80px;
            font-weight: 500;
        }
        .api-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .api-note {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 高精度OCR识别器</h1>
        <p class="subtitle">基于百度智能云OCR API - 无需下载模型，纯云端处理</p>

        <div class="api-config">
            <h3>🔑 API配置</h3>
            <div class="api-input">
                <label>AppID:</label>
                <input type="text" id="appId" placeholder="输入百度智能云AppID">
            </div>
            <div class="api-input">
                <label>API Key:</label>
                <input type="text" id="apiKey" placeholder="输入百度智能云API Key">
            </div>
            <div class="api-input">
                <label>Secret Key:</label>
                <input type="text" id="secretKey" placeholder="输入百度智能云Secret Key">
            </div>
            <div class="api-note">
                📝 如何获取API密钥：<br>
                1. 访问 <a href="https://ai.baidu.com/" target="_blank">百度智能云</a> 注册账号<br>
                2. 创建文字识别应用，获取AppID、API Key、Secret Key<br>
                3. 免费额度：每月50000次调用
            </div>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📷</div>
            <div class="upload-text">点击或拖拽图片到此处上传</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="image-preview">
            <canvas id="imageCanvas"></canvas>
        </div>

        <div class="loading" id="loading">正在识别中，请稍候...</div>

        <button class="btn" id="recognizeBtn" disabled>开始识别</button>

        <div class="result">
            <h3>识别结果：</h3>
            <textarea id="resultText" readonly placeholder="识别结果将显示在这里..."></textarea>
        </div>

        <div class="accuracy-note">
            <h3>💯 高准确率保证</h3>
            <p>使用百度智能云OCR API，基于深度学习技术，中文识别准确率高达99%。支持多种场景：通用文字、身份证、银行卡、营业执照等。</p>
        </div>
    </div>

    <script>
        // 百度OCR API配置
        const API_CONFIG = {
            tokenUrl: 'https://aip.baidubce.com/oauth/2.0/token',
            ocrUrl: 'https://aip.baidubce.com/rest/2.0/ocr/v1/general_basic'
        };

        let accessToken = null;
        let currentImageBase64 = null;

        // 获取访问令牌
        async function getAccessToken() {
            const appId = document.getElementById('appId').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const secretKey = document.getElementById('secretKey').value.trim();

            if (!appId || !apiKey || !secretKey) {
                throw new Error('请填写完整的API配置信息');
            }

            const response = await fetch(`${API_CONFIG.tokenUrl}?grant_type=client_credentials&client_id=${apiKey}&client_secret=${secretKey}`, {
                method: 'POST'
            });

            if (!response.ok) {
                throw new Error(`获取访问令牌失败: ${response.status} ${response.statusText}`);
            }

            const data = await response.json();
            if (data.error) {
                throw new Error(`API错误: ${data.error_description}`);
            }

            accessToken = data.access_token;
            return accessToken;
        }

        // OCR识别
        async function recognizeOCR(imageBase64) {
            if (!accessToken) {
                await getAccessToken();
            }

            const response = await fetch(API_CONFIG.ocrUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    access_token: accessToken,
                    image: imageBase64,
                    detect_direction: 'true',
                    probability: 'true'
                })
            });

            if (!response.ok) {
                if (response.status === 401) {
                    // 令牌过期，重新获取
                    accessToken = null;
                    return await recognizeOCR(imageBase64);
                }
                throw new Error(`OCR识别失败: ${response.status} ${response.statusText}`);
            }

            const data = await response.json();
            if (data.error_code) {
                throw new Error(`OCR API错误: ${data.error_msg}`);
            }

            return data;
        }

        // 处理文件上传
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('imageCanvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    document.querySelector('.image-preview').style.display = 'block';
                    document.getElementById('recognizeBtn').disabled = false;
                    document.getElementById('resultText').value = '';

                    // 转换为base64（去掉data:image/...;base64,前缀）
                    currentImageBase64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const recognizeBtn = document.getElementById('recognizeBtn');
            const resultText = document.getElementById('resultText');
            const loading = document.getElementById('loading');

            // 上传区域事件
            uploadArea.addEventListener('click', () => fileInput.click());
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) handleFile(files[0]);
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) handleFile(e.target.files[0]);
            });

            // 识别按钮事件
            recognizeBtn.addEventListener('click', async () => {
                if (!currentImageBase64) return;

                recognizeBtn.disabled = true;
                recognizeBtn.textContent = '识别中...';
                loading.style.display = 'block';
                resultText.value = '正在连接百度OCR API，请稍候...';

                try {
                    const result = await recognizeOCR(currentImageBase64);

                    let finalText = '';
                    if (result.words_result && result.words_result.length > 0) {
                        finalText = result.words_result.map(item => item.words).join('\n');
                    } else {
                        finalText = '未识别到文字，请检查图片质量或内容';
                    }

                    resultText.value = finalText;
                    loading.style.display = 'none';
                    recognizeBtn.textContent = '重新识别';
                    recognizeBtn.disabled = false;

                } catch (error) {
                    console.error('OCR识别失败:', error);
                    resultText.value = `识别失败: ${error.message}\n\n请检查：\n1. API密钥是否正确\n2. 网络连接是否正常\n3. 是否超出免费额度`;
                    loading.style.display = 'none';
                    recognizeBtn.textContent = '开始识别';
                    recognizeBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
