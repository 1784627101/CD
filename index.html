<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高精度OCR识别器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 40px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        #fileInput {
            display: none;
        }
        .upload-icon {
            font-size: 3em;
            color: #ccc;
            margin-bottom: 10px;
        }
        .upload-text {
            color: #666;
            font-size: 1.1em;
        }
        .image-preview {
            margin: 20px 0;
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: none;
        }
        #imageCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
        .result {
            margin-top: 20px;
            text-align: left;
        }
        #resultText {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            background: #f9f9f9;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            display: none;
            color: #667eea;
            font-size: 18px;
            margin: 20px 0;
        }
        .progress {
            width: 100%;
            height: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        .accuracy-note {
            background: #e8f5e8;
            border: 1px solid #4caf50;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            color: #2e7d32;
        }
        .accuracy-note h3 {
            margin-bottom: 10px;
            color: #1b5e20;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 高精度OCR识别器</h1>
        <p class="subtitle">基于PaddlePaddle PP-OCRv4 - 业界领先的中文OCR技术</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📷</div>
            <div class="upload-text">点击或拖拽图片到此处上传</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="image-preview">
            <canvas id="imageCanvas"></canvas>
        </div>

        <div class="loading" id="loading">正在加载模型，请稍候...</div>
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <button class="btn" id="recognizeBtn" disabled>开始识别</button>

        <div class="result">
            <h3>识别结果：</h3>
            <textarea id="resultText" readonly placeholder="识别结果将显示在这里..."></textarea>
        </div>

        <div class="accuracy-note">
            <h3>💯 高准确率保证</h3>
            <p>使用PP-OCRv4模型，经过百万级数据训练，中文识别准确率高达98%以上。支持中英文混合、多行文本、复杂背景等场景。</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@paddlejs/paddlejs-core@2.1.0/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@paddlejs/paddlejs-backend-webgl@2.1.0/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@paddlejs/ocr-det@2.1.0/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@paddlejs/ocr-rec@2.1.0/dist/index.min.js"></script>
    <script>
        let ocr = null;
        let imageData = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const imageCanvas = document.getElementById('imageCanvas');
        const recognizeBtn = document.getElementById('recognizeBtn');
        const resultText = document.getElementById('resultText');
        const loading = document.getElementById('loading');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const imagePreview = document.querySelector('.image-preview');

        // 初始化OCR
        async function initOCR() {
            loading.style.display = 'block';
            progress.style.display = 'block';

            try {
                // 初始化检测模型
                const det = new Paddlejs.OcrDet({
                    url: './models/ch_PP-OCRv4_det_infer/inference.pdmodel',
                    paramUrl: './models/ch_PP-OCRv4_det_infer/inference.pdiparams'
                });

                // 初始化识别模型
                const rec = new Paddlejs.OcrRec({
                    url: './models/ch_PP-OCRv4_rec_infer/inference.pdmodel',
                    paramUrl: './models/ch_PP-OCRv4_rec_infer/inference.pdiparams'
                });

                // 创建OCR实例
                ocr = new Paddlejs.Ocr(det, rec);

                progressBar.style.width = '100%';
                loading.textContent = '模型加载完成！';
                setTimeout(() => {
                    loading.style.display = 'none';
                    progress.style.display = 'none';
                }, 1000);

            } catch (error) {
                console.error('模型加载失败:', error);
                loading.textContent = '模型加载失败，请检查网络连接或模型文件路径';
                loading.style.color = 'red';
            }
        }

        // 上传文件处理
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = imageCanvas;
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    imagePreview.style.display = 'block';
                    recognizeBtn.disabled = false;
                    resultText.value = '';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // OCR识别
        recognizeBtn.addEventListener('click', async () => {
            if (!imageData || !ocr) return;

            recognizeBtn.disabled = true;
            recognizeBtn.textContent = '识别中...';
            resultText.value = '正在进行文字检测和识别，请稍候...';

            try {
                // 运行OCR
                const result = await ocr.predict(imageData);

                // 处理结果
                let finalText = '';
                if (result && result.text) {
                    finalText = result.text;
                } else if (result && Array.isArray(result)) {
                    finalText = result.map(item => item.text || '').join('\n');
                } else {
                    finalText = '识别完成，但结果格式未知。\n调试信息: ' + JSON.stringify(result, null, 2);
                }

                resultText.value = finalText;
                recognizeBtn.textContent = '重新识别';
                recognizeBtn.disabled = false;

            } catch (error) {
                console.error('OCR识别失败:', error);
                resultText.value = '识别失败，请重试或检查图片质量\n错误信息: ' + error.message;
                recognizeBtn.textContent = '开始识别';
                recognizeBtn.disabled = false;
            }
        });

        // 初始化
        initOCR();
    </script>
</body>
</html>
