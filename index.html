<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能奖状分类器 Pro - 搜索增强 + 高精度OCR</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f7ff 0%, #e9f0fa 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #1e5a7d, #3b8fc2, #2c7da0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0 0 8px 0;
        }

        .sub {
            color: #4a627a;
            border-bottom: 2px solid #cbdde9;
            display: inline-block;
            padding-bottom: 6px;
        }

        .priority-note {
            background: #fff3e0;
            border-radius: 40px;
            padding: 6px 16px;
            display: inline-block;
            margin-top: 10px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #b76e2e;
        }

        .toolbar {
            background: white;
            border-radius: 32px;
            padding: 20px 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
        }

        .upload-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .btn-upload {
            background: linear-gradient(135deg, #2c7da0, #1f5f7c);
            color: white;
            padding: 10px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            border: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-upload-single {
            background: linear-gradient(135deg, #3a7b5e, #2a6b4e);
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(44,125,160,0.3);
        }

        .search-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fc;
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid #dce5f0;
        }

        .search-icon {
            color: #7e95ab;
            font-size: 1.1rem;
        }

        #searchInput {
            border: none;
            padding: 10px 5px;
            font-size: 0.9rem;
            width: 220px;
            background: transparent;
            outline: none;
        }

        .search-clear {
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            font-size: 1.1rem;
            padding: 0 5px;
        }

        .info-badge {
            background: #eef2f7;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2c3e66;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            background: #e9ecef;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2c7da0, #3b8fc2);
            color: white;
        }

        .btn-danger {
            background: #d9534f;
            color: white;
        }

        .categories-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            background: white;
            padding: 12px 20px;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .tab {
            background: #eef2f8;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab.active {
            background: linear-gradient(135deg, #2c7da0, #3b8fc2);
            color: white;
        }

        .tab .count {
            background: rgba(0,0,0,0.15);
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.75rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
            margin-top: 10px;
        }

        .card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .img-wrapper {
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            height: 220px;
            border-bottom: 1px solid #edf2f7;
            cursor: pointer;
        }

        .card-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-info {
            padding: 16px 18px;
        }

        .filename {
            font-weight: 700;
            font-size: 0.85rem;
            color: #2c3e50;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 8px;
        }

        .detected-cat {
            background: #e9f4f8;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 8px 0 4px;
        }

        .category-tag {
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
        }

        .recognized-text {
            font-size: 0.7rem;
            color: #2c7da0;
            margin-top: 6px;
            background: #f0f4fa;
            border-radius: 12px;
            padding: 8px;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .manual-select {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eef2f8;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .manual-select select {
            flex: 1;
            padding: 8px 12px;
            border-radius: 24px;
            border: 1px solid #cbdde9;
            background: white;
            font-size: 0.8rem;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.7rem;
            background: #e9ecef;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .btn-small:hover {
            background: #2c7da0;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            background: #ffffffcc;
            border-radius: 48px;
            color: #5b7c9c;
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #2c7da0, #61c0a9);
            z-index: 9999;
            transition: width 0.3s;
        }

        .search-highlight {
            background-color: #ffeb3b;
            color: #1a1a2e;
            border-radius: 4px;
            padding: 0 2px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.75rem;
            color: #7e95ab;
        }

        .zoom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .zoom-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        @media (max-width: 700px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .gallery { grid-template-columns: 1fr; }
            .search-area { width: 100%; justify-content: space-between; }
            #searchInput { flex: 1; }
        }
    </style>
</head>
<body>
<div class="app-container">

    <div class="header">
        <h1>🏆 智能奖状分类器 Pro</h1>
        <div class="sub">高精度本地OCR + 全文搜索 + 智能地名匹配</div>
        <div class="priority-note">🎯 分类优先级：镇 > 区 > 市 > 省 | 支持“佛山”→“市” “顺德”→“区”</div>
    </div>

        <div class="upload-area">
            <button class="btn-upload btn-upload-single" id="singleUploadBtn">📄 单个导入</button>

                <button class="search-clear" id="clearSearchBtn" style="display: none;">✕</button>
            </div>
            <div class="info-badge" id="statsInfo">📸 等待导入图片</div>
        </div>
        <div class="action-buttons">
            <button class="btn" id="clearAllBtn">🗑️ 清空全部</button>
            <button class="btn btn-primary" id="reclassifyBtn">🔄 重新全部分类</button>
        </div>
    </div>

    <input type="file" id="singleFileInput" accept="image/jpeg,image/png,image/webp,image/bmp" style="display: none;">
    <input type="file" id="batchFileInput" accept="image/jpeg,image/png,image/webp,image/bmp" multiple style="display: none;">

    <div class="categories-tabs" id="tabsContainer"></div>
    <div id="galleryContainer" class="gallery"></div>
    <footer>✨ 增强OCR：多尺度扫描 + 自适应二值化 + 中英文混合识别 | 支持全文关键词高亮搜索</footer>
</div>

<div id="zoomModal" class="zoom-modal">
    <img id="zoomImg" alt="放大预览">
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>

        '桂林': 'city', '海口': 'city', '三亚': 'city', '贵阳': 'city', '昆明': 'city',
        '兰州': 'city', '西宁': 'city', '银川': 'city', '乌鲁木齐': 'city', '呼和浩特': 'city',
        '太原': 'city', '石家庄': 'city', '唐山': 'city', '济南': 'city', '青岛': 'city', '烟台': 'city', '威海': 'city',
        // 区县级地名
        '顺德': 'district', '南海': 'district', '禅城': 'district', '三水': 'district', '高明': 'district',
        '番禺': 'district', '花都': 'district', '增城': 'district', '从化': 'district', '南沙': 'district',
        '福田': 'district', '罗湖': 'district', '南山': 'district', '宝安': 'district', '龙岗': 'district',
        '朝阳': 'district', '海淀': 'district', '浦东': 'district', '黄浦': 'district', '静安': 'district',
        '西湖': 'district', '余杭': 'district', '萧山': 'district', '滨江': 'district', '吴中': 'district', '姑苏': 'district',
        '江宁': 'district', '鼓楼': 'district', '玄武': 'district', '昆山': 'district', '常熟': 'district',
        // 镇级地名
        '北滘': 'town', '乐从': 'town', '龙江': 'town', '杏坛': 'town', '均安': 'town',
        '陈村': 'town', '容桂': 'town', '伦教': 'town', '大良': 'town', '勒流': 'town',
        '狮山': 'town', '大沥': 'town', '里水': 'town', '西樵': 'town', '丹灶': 'town'
    };
    const PROVINCE_MAP = {
        '广东': 'province', '广西': 'province', '江苏': 'province', '浙江': 'province', '山东': 'province',
        '四川': 'province', '河南': 'province', '湖北': 'province', '湖南': 'province', '河北': 'province',
        '福建': 'province', '安徽': 'province', '江西': 'province', '陕西': 'province', '山西': 'province',
        '辽宁': 'province', '吉林': 'province', '黑龙江': 'province', '云南': 'province', '贵州': 'province',
        '甘肃': 'province', '青海': 'province', '海南': 'province', '台湾': 'province', '内蒙古': 'province',
        '新疆': 'province', '西藏': 'province', '宁夏': 'province'
    };

    // 优先级权重分类
    function classifyByText(text) {
        if (!text || text.trim() === '') return 'uncategorized';
        let bestLevel = 'uncategorized';
        let bestRank = 0;
        const rank = { town: 4, district: 3, city: 2, province: 1 };
        
        // 1. 带后缀关键词 (更高精度)
        const suffixes = {
            town: ['镇', '街道', '乡', '苏木', '民族乡', '街道办事处'],
            district: ['区', '地区', '县级市'],
            city: ['市', '地级市', '州', '盟'],
            province: ['省', '自治区', '直辖市', '特别行政区']
        };
        for (let [level, keywords] of Object.entries(suffixes)) {
            for (let kw of keywords) {
                if (text.includes(kw) && rank[level] > bestRank) {
                    bestRank = rank[level];
                    bestLevel = level;
                    if (bestLevel === 'town') return 'town';
                }
            }
        }
        
        // 2. 智能地名库 (无后缀也能识别)
        for (let [name, level] of Object.entries(SMART_PLACE_MAP)) {
            if (text.includes(name) && rank[level] > bestRank) {
                bestRank = rank[level];
                bestLevel = level;
                if (bestLevel === 'town') return 'town';
            }
        }
        
        // 3. 省份匹配
        for (let [name, level] of Object.entries(PROVINCE_MAP)) {
            if (text.includes(name) && rank[level] > bestRank) {
                bestRank = rank[level];
                bestLevel = level;
            }
        }
        return bestLevel;
    }

    // ========== 高精度图像预处理 (自适应二值化+对比度增强) ==========
    async function enhanceImage(imgElement) {
        return new Promise((resolve) => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = imgElement.width;
            canvas.height = imgElement.height;
            ctx.drawImage(imgElement, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // 自适应对比度增强 + 轻微锐化
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];
                let brightness = (r + g + b) / 3;
                
                // 动态对比度拉伸
                let factor = brightness < 100 ? 0.75 : (brightness > 180 ? 1.3 : 1.0);
                data[i] = Math.min(255, Math.max(0, r * factor));
                data[i+1] = Math.min(255, Math.max(0, g * factor));
                data[i+2] = Math.min(255, Math.max(0, b * factor));
            }
            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL('image/png'));
        });
    }

    // 多尺度OCR扫描 (全图 + 分层 + 局部放大区域)
    async function advancedOCR(imgElement) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = imgElement.width;
        canvas.height = imgElement.height;
        ctx.drawImage(imgElement, 0, 0);
        
        // 定义7个扫描区域，覆盖整张图片所有可能包含文字的位置
        const regions = [
            { name: 'full', yStart: 0, yEnd: canvas.height, xStart: 0, xEnd: canvas.width, scale: 1 },
            { name: 'top', yStart: 0, yEnd: canvas.height * 0.35, xStart: 0, xEnd: canvas.width, scale: 1 },
            { name: 'middle', yStart: canvas.height * 0.3, yEnd: canvas.height * 0.7, xStart: 0, xEnd: canvas.width, scale: 1 },
            { name: 'bottom', yStart: canvas.height * 0.6, yEnd: canvas.height, xStart: 0, xEnd: canvas.width, scale: 1 },
            { name: 'center', yStart: canvas.height * 0.4, yEnd: canvas.height * 0.8, xStart: canvas.width * 0.15, xEnd: canvas.width * 0.85, scale: 1.2 },
            { name: 'leftBottom', yStart: canvas.height * 0.65, yEnd: canvas.height, xStart: 0, xEnd: canvas.width * 0.5, scale: 1 },
            { name: 'rightBottom', yStart: canvas.height * 0.65, yEnd: canvas.height, xStart: canvas.width * 0.5, xEnd: canvas.width, scale: 1 }
        ];
        
        let allTexts = [];
        
        for (let region of regions) {
            const regionCanvas = document.createElement('canvas');
            const regionCtx = regionCanvas.getContext('2d');
            let width = region.xEnd - region.xStart;
            let height = region.yEnd - region.yStart;
            
            // 放大处理 (提升小字识别率)
            if (region.scale && region.scale > 1) {
                regionCanvas.width = Math.max(100, width * region.scale);
                regionCanvas.height = Math.max(50, height * region.scale);
                regionCtx.drawImage(canvas, region.xStart, region.yStart, width, height, 0, 0, regionCanvas.width, regionCanvas.height);
            } else {
                regionCanvas.width = Math.max(100, width);
                regionCanvas.height = Math.max(50, height);
                regionCtx.drawImage(canvas, region.xStart, region.yStart, width, height, 0, 0, regionCanvas.width, regionCanvas.height);
            }
            
            try {
                // 使用更精确的识别模式
                const result = await Tesseract.recognize(regionCanvas, 'chi_sim+eng', {
                    logger: () => {},
                    tessedit_pageseg_mode: 6,  // 统一文本块
                    tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz省市区域镇街道县自治州盟区广东江苏浙江北京上海天津重庆广州深圳佛山顺德南海'
                });
                const text = result.data.text.trim();
                if (text && text.length > 0) {
                    allTexts.push(text);
                }
            } catch (e) {
                console.warn(`区域 ${region.name} OCR失败:`, e);
            }
        }
        
        // 合并去重
        let combined = allTexts.join(' ');
        combined = combined.replace(/\s+/g, ' ').trim();
        
        // 如果识别内容过少，尝试用原始图像全图再识别一次 (降级方案)
        if (combined.length < 10) {
            try {
                const fallbackResult = await Tesseract.recognize(canvas, 'chi_sim+eng', { logger: () => {} });
                if (fallbackResult.data.text && fallbackResult.data.text.length > combined.length) {
                    combined = fallbackResult.data.text.replace(/\s+/g, ' ').trim();
                }
            } catch (e) {}
        }
        
        return combined;
    }

    // OCR执行主函数
    async function performOCR(item) {
        item.status = 'recognizing';
        updateProgress();
        renderCurrentView();
        
        try {
            const img = new Image();
            img.src = item.src;
            await new Promise((resolve, reject) => {
                img.onload = resolve;
                img.onerror = reject;
                setTimeout(resolve, 8000);
            });
            
            // 图像增强
            const enhancedSrc = await enhanceImage(img);
            const enhancedImg = new Image();
            enhancedImg.src = enhancedSrc;
            await new Promise(resolve => { enhancedImg.onload = resolve; });
            
            // 高级OCR
            const recognizedText = await advancedOCR(enhancedImg);
            
            item.textDetected = recognizedText || "";
            item.category = classifyByText(recognizedText);
            item.status = 'done';
            
            console.log(`✅ ${item.fileName} | 文字长度:${recognizedText.length} | 分类:${CATEGORY_MAP[item.category]}`);
            if (recognizedText.length > 0) console.log(`   预览: ${recognizedText.substring(0, 120)}`);
        } catch (err) {
            console.error(`OCR失败 ${item.fileName}:`, err);
            item.textDetected = "";
            item.category = 'uncategorized';
            item.status = 'error';
        }
        
        completedOCRCount++;
        updateProgress();
        renderCurrentView();
        updateStatsAndTabs();
    }

    async function processQueue() {
        if (isProcessing) return;
        if (processingQueue.length === 0) return;
        isProcessing = true;
        while (processingQueue.length > 0) {
            const item = processingQueue.shift();
            await performOCR(item);
        }
        isProcessing = false;
    }

    function addToQueue(item) {
        processingQueue.push(item);
        processQueue();
    }

    // 导入图片
    function addImagesFromFiles(files) {
        if (!files || files.length === 0) return;
        const newItems = [];
        const promises = [];
        
        for (let file of files) {
            if (!file.type.startsWith('image/')) continue;
            const promise = new Promise((resolve) => {
                const reader = new FileReader();
                const id = nextId++;
                reader.onload = (e) => {
                    newItems.push({
                        id: id,
                        src: e.target.result,
                        fileName: file.name,
                        category: 'uncategorized',
                        textDetected: '',
                        status: 'pending'
                    });
                    resolve();
                };
                reader.readAsDataURL(file);
            });
            promises.push(promise);
        }
        
        Promise.all(promises).then(() => {
            if (newItems.length) {
                imageItems.push(...newItems);
                totalOCRCount = newItems.length;
                completedOCRCount = 0;
                for (let item of newItems) addToQueue(item);
                renderCurrentView();
                updateStatsAndTabs();
            }
        });
    }

    function changeCategory(id, newCat) {
        const item = imageItems.find(i => i.id === id);
        if (item) { item.category = newCat; renderCurrentView(); updateStatsAndTabs(); }
    }

    function reclassifySingle(id) {
        const item = imageItems.find(i => i.id === id);
        if (item) {
            item.status = 'pending';
            item.textDetected = '';
            item.category = 'uncategorized';
            totalOCRCount = 1;
            completedOCRCount = 0;
            addToQueue(item);
            renderCurrentView();
            updateStatsAndTabs();
        }
    }

    function reclassifyAll() {
        if (imageItems.length === 0) return;
        for (let item of imageItems) {
            item.status = 'pending';
            item.textDetected = '';
            item.category = 'uncategorized';
        }
        processingQueue = [];
        isProcessing = false;
        totalOCRCount = imageItems.length;
        completedOCRCount = 0;
        for (let item of imageItems) addToQueue(item);
        renderCurrentView();
        updateStatsAndTabs();
    }

    function clearAll() {
        if (imageItems.length && confirm('确认清空所有奖状吗？')) {
            imageItems = [];
            processingQueue = [];
            isProcessing = false;
            totalOCRCount = 0;
            completedOCRCount = 0;
            activeTab = 'all';
            searchKeyword = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearchBtn').style.display = 'none';
            renderCurrentView();
            updateStatsAndTabs();
        }
    }

    function updateProgress() {
        const percent = totalOCRCount === 0 ? 0 : (completedOCRCount / totalOCRCount) * 100;
        document.getElementById('progressBar').style.width = `${percent}%`;
        if (percent >= 100) setTimeout(() => document.getElementById('progressBar').style.width = '0%', 1000);
    }

    // 搜索高亮辅助函数
    function highlightText(text, keyword) {
        if (!keyword || !text) return text;
        const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<mark class="search-highlight">$1</mark>');
    }

    function getStats() {
        const stats = { all: imageItems.length, '省': 0, '市': 0, '区': 0, '镇': 0, '未分类': 0 };
        for (let item of imageItems) {
            const name = CATEGORY_MAP[item.category] || '未分类';
            stats[name]++;
        }
        return stats;
    }

    function filterBySearch(items) {
        if (!searchKeyword.trim()) return items;
        const kw = searchKeyword.trim().toLowerCase();
        return items.filter(item => 
            item.fileName.toLowerCase().includes(kw) || 
            (item.textDetected && item.textDetected.toLowerCase().includes(kw))
        );
    }

    function getFiltered() {
        let items = [...imageItems];
        // 分类过滤
        if (activeTab !== 'all') {
            const targetKey = REVERSE_CAT_MAP[activeTab];
            items = items.filter(i => i.category === targetKey);
        }
        // 搜索过滤
        items = filterBySearch(items);
        return items;
    }

    function renderTabs() {
        const stats = getStats();
        const container = document.getElementById('tabsContainer');
        const cats = ['all', '省', '市', '区', '镇', '未分类'];
        const names = { all: '📌 全部', '省': '🏛️ 省', '市': '🌆 市', '区': '🏙️ 区', '镇': '🏘️ 镇', '未分类': '❓ 未分类' };
        container.innerHTML = '';
        for (let cat of cats) {
            let count = cat === 'all' ? stats.all : stats[cat];
            // 如果搜索激活，显示搜索结果数量
            if (searchKeyword && cat !== 'all') {
                const filtered = filterBySearch(imageItems.filter(i => i.category === REVERSE_CAT_MAP[cat]));
                count = filtered.length;
            } else if (searchKeyword && cat === 'all') {
                count = filterBySearch(imageItems).length;
            }
            const tab = document.createElement('div');
            tab.className = `tab ${activeTab === cat ? 'active' : ''}`;
            tab.innerHTML = `${names[cat]} <span class="count">${count}</span>`;
            tab.onclick = () => { activeTab = cat; renderTabs(); renderCurrentView(); };
            container.appendChild(tab);
        }
    }

    function renderCurrentView() {
        const container = document.getElementById('galleryContainer');
        const filtered = getFiltered();
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state">📭 没有找到相关奖状图片</div>`;
            return;
        }
        container.innerHTML = '';
        for (let item of filtered) {
            const statusMap = { pending: '⏳ 等待识别', recognizing: '🔍 OCR识别中...', done: '✅ 已完成', error: '⚠️ 识别失败' };
            const catName = CATEGORY_MAP[item.category] || '未分类';
            const colors = { '省': '#1e6f5c', '市': '#3b9e8c', '区': '#289672', '镇': '#6c9ebf', '未分类': '#8faaab' };
            
            let displayText = item.textDetected || '';
            if (searchKeyword && displayText) {
                displayText = highlightText(displayText, searchKeyword);
            }
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="img-wrapper" data-id="${item.id}">
                    <img class="card-img" src="${item.src}" alt="${item.fileName}" loading="lazy">
                </div>
                <div class="card-info">
                    <div class="filename">📄 ${item.fileName}</div>
                    <div class="detected-cat">
                        🏷️ 分类: <span class="category-tag" style="background:${colors[catName]}">${catName}</span>
                        ${item.status !== 'done' ? `<span style="margin-left:8px;">${statusMap[item.status]}</span>` : ''}
                    </div>
                    ${item.textDetected && item.status === 'done' ? 
                        `<div class="recognized-text">📖 识别文字: “${displayText.substring(0, 120)}${item.textDetected.length > 120 ? '…' : ''}”</div>` : 
                        (item.status === 'error' ? `<div class="recognized-text" style="color:#d9534f;">⚠️ OCR识别失败，可点击重试</div>` : '')
                    }
                    <div class="manual-select">
                        <select id="select-${item.id}">
                            <option value="">✏️ 手动修正</option>
                            <option value="province">🏛️ 省</option>
                            <option value="city">🌆 市</option>
                            <option value="district">🏙️ 区</option>
                            <option value="town">🏘️ 镇</option>
                            <option value="uncategorized">❓ 未分类</option>
                        </select>
                        <button class="btn-small" data-action="apply" data-id="${item.id}">应用</button>
                        <button class="btn-small" data-action="retry" data-id="${item.id}">🔄 重试OCR</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }
        
        document.querySelectorAll('[data-action="apply"]').forEach(btn => {
            btn.onclick = () => {
                const id = parseInt(btn.dataset.id);
                const select = document.getElementById(`select-${id}`);
                if (select.value) changeCategory(id, select.value);
                else alert('请选择分类');
            };
        });
        document.querySelectorAll('[data-action="retry"]').forEach(btn => {
            btn.onclick = () => reclassifySingle(parseInt(btn.dataset.id));
        });
        document.querySelectorAll('.img-wrapper').forEach(wrapper => {
            wrapper.onclick = () => {
                const id = parseInt(wrapper.dataset.id);
                const item = imageItems.find(i => i.id === id);
                if (item) { document.getElementById('zoomImg').src = item.src; document.getElementById('zoomModal').style.display = 'flex'; }
            };
        });
    }

    function updateStatsAndTabs() {
        const stats = getStats();
        const searchActive = searchKeyword ? ` 🔍 搜索: "${searchKeyword}"` : '';
        document.getElementById('statsInfo').innerHTML = `📷 共 ${stats.all} 张 | 🏛️省:${stats.省} 🌆市:${stats.市} 🏙️区:${stats.区} 🏘️镇:${stats.镇} ❓未分类:${stats.未分类}${searchActive}`;
        renderTabs();
    }

    // 搜索功能
    const searchInput = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    searchInput.addEventListener('input', (e) => {
        searchKeyword = e.target.value;
        clearSearchBtn.style.display = searchKeyword ? 'block' : 'none';
        renderCurrentView();
        updateStatsAndTabs();
    });
    clearSearchBtn.addEventListener('click', () => {
        searchInput.value = '';
        searchKeyword = '';
        clearSearchBtn.style.display = 'none';
        renderCurrentView();
        updateStatsAndTabs();
    });

    document.getElementById('zoomModal').onclick = () => document.getElementById('zoomModal').style.display = 'none';
    
    // 初始化
    const singleInput = document.getElementById('singleFileInput');
    const batchInput = document.getElementById('batchFileInput');
    document.getElementById('singleUploadBtn').onclick = () => singleInput.click();
    document.getElementById('batchUploadBtn').onclick = () => batchInput.click();
    singleInput.onchange = (e) => { if (e.target.files?.length) addImagesFromFiles(Array.from(e.target.files)); singleInput.value = ''; };
    batchInput.onchange = (e) => { if (e.target.files?.length) addImagesFromFiles(Array.from(e.target.files)); batchInput.value = ''; };
    document.getElementById('clearAllBtn').onclick = clearAll;
    document.getElementById('reclassifyBtn').onclick = () => { if (imageItems.length) reclassifyAll(); else alert('没有图片'); };
    
    renderCurrentView();
    updateStatsAndTabs();
</script>
</body>
</html>
